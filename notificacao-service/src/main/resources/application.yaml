spring:
  application:
    name: notificacao-service
  cloud:
    function:
      definition: notificacaoConsumer
    stream:
      bindings:
        notificacaoConsumer-in-0:
          destination: notificacao
          group: notificacao-service
      kafka:
        binder:
          brokers: localhost:9092
server:
  port: 8081