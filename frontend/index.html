<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Statement - Real-time Dashboard</title>
    <!-- React & Tailwind CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .notification-animation { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // CHANGE THIS TO THE IP OF THE MACHINE RUNNING THE SERVICES
        const BACKEND_IP = "localhost"; 

        const App = () => {
            const [numeroConta, setNumeroConta] = useState('');
            const [extrato, setExtrato] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [status, setStatus] = useState('Desconectado');
            const [loading, setLoading] = useState(false);
            const [saldo, setSaldo] = useState(0);
            const [limiteCredito, setLimiteCredito] = useState(0);
            const [simulando, setSimulando] = useState(false);
            const eventSourceRef = React.useRef(null);

            // Simulation Form State
            const [formNumeroConta, setFormNumeroConta] = useState('');
            const [formValor, setFormValor] = useState('');
            const [formEstabelecimento, setFormEstabelecimento] = useState('');
            const [formTipo, setFormTipo] = useState('DEBITO');
            const [formDataHora, setFormDataHora] = useState('');

            const connectSSE = () => {
                if (!numeroConta) {
                    const id = Date.now();
                    setNotifications(prev => [...prev, { id, msg: "Informe o numero da conta antes de conectar!", tipo: "warn", lado: "esquerda" }]);
                    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
                    return;
                }

                if (eventSourceRef.current) {
                    eventSourceRef.current.close();
                }

                fetchExtrato(numeroConta);

                console.log(`Iniciando SSE para conta: ${numeroConta}`);
                setStatus('Conectando...');
                const es = new EventSource(`http://${BACKEND_IP}:8085/notificacao?numeroConta=${numeroConta}`);
                eventSourceRef.current = es;

                es.onopen = () => {
                    console.log("Conexão SSE estabelecida");
                    setStatus('Conectado');
                };

                es.onmessage = (event) => {
                    if (!event.data) {
                        console.debug("Recebido heartbeat/comentário");
                        return;
                    }

                    try {
                        const data = JSON.parse(event.data);
                        console.log("Notificação recebida:", data);

                        if (data.mensagem.includes("Conexão estabelecida")) return;

                        const newNotif = { id: Date.now(), msg: data.mensagem, lado: "direita" };
                        setNotifications(prev => [newNotif, ...prev]);
                        fetchExtrato(numeroConta);

                        setTimeout(() => {
                            setNotifications(prev => prev.filter(n => n.id !== newNotif.id));
                        }, 6000);
                    } catch (e) {
                        console.error("Erro ao processar mensagem SSE:", e);
                    }
                };

                es.onerror = (e) => {
                    console.error("Erro SSE (Reconectando):", e);
                    setStatus('Erro (Reconectando...)');
                };
            };

            const disconnectSSE = () => {
                if (eventSourceRef.current) {
                    console.log("Fechando conexão SSE");
                    eventSourceRef.current.close();
                    eventSourceRef.current = null;
                }
                setStatus('Desconectado');
            };

            const fetchExtrato = useCallback(async (conta) => {
                setLoading(true);
                console.log(`[Extrato] Buscando extrato para conta ${conta}...`);
                try {
                    const res = await fetch(`http://${BACKEND_IP}:8087/registro-transacao/extrato/${conta}`);
                    if (res.ok) {
                        const data = await res.json();
                        console.log(`[Extrato] ${data.length} transações encontradas.`);
                        setExtrato(data.sort((a, b) => new Date(b.timeStamp) - new Date(a.timeStamp)));
                    } else {
                        console.warn(`[Extrato] Resposta não OK: ${res.status}`);
                    }
                    getSaldo(conta);
                    getLimiteCredito(conta);
                } catch (e) {
                    console.error("[Extrato] Erro ao carregar extrato:", e);
                } finally {
                    setLoading(false);
                }
            }, []);

            const getSaldo = async (conta) => {
                console.log(`[Saldo] Buscando saldo para conta ${conta}...`);
                try {
                    const res = await fetch(`http://${BACKEND_IP}:8087/registro-transacao/saldo/${conta}`);
                    if (res.ok) {
                        const data = await res.json();
                        console.log(`[Saldo] Saldo: R$ ${((data.saldo || data) / 100).toFixed(2)}`);
                        setSaldo(data.saldo || data);
                    } else {
                        console.warn(`[Saldo] Resposta não OK: ${res.status}`);
                    }
                } catch (e) {
                    console.error("[Saldo] Erro ao buscar saldo:", e);
                }
            };

            const getLimiteCredito = async (conta) => {
                console.log(`[Limite] Buscando limite de crédito para conta ${conta}...`);
                try {
                    const res = await fetch(`http://${BACKEND_IP}:8087/registro-transacao/limiteCredito/${conta}`);
                    if (res.ok) {
                        const data = await res.json();
                        console.log(`[Limite] R$ ${((data.limiteCredito || data) / 100).toFixed(2)}`);
                        setLimiteCredito(data.limiteCredito || data);
                    } else {
                        console.warn(`[Limite] Resposta não OK: ${res.status}`);
                    }
                } catch (e) {
                    console.error("[Limite] Erro ao buscar limite de crédito:", e);
                }
            };

            const simulateTransaction = async () => {
                if (!formNumeroConta || !formValor || !formEstabelecimento) {
                    const id = Date.now();
                    setNotifications(prev => [...prev, { id, msg: "Preencha todos os campos!", tipo: "warn", lado: "esquerda" }]);
                    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 4000);
                    return;
                }

                const payload = {
                    numeroConta: formNumeroConta,
                    valor: parseInt(parseFloat(formValor) * 100),
                    tipoTransacao: formTipo,
                    timeStamp: formDataHora ? new Date(formDataHora).toISOString() : new Date().toISOString(),
                    estabelecimento: formEstabelecimento,
                    historico: {}
                };

                setSimulando(true);

                try {
                    const res = await fetch(`http://${BACKEND_IP}:8083/camundaTeste/`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        const resultado = await res.json();

                        if (resultado === true) {
                            const id = Date.now();
                            setNotifications(prev => [{
                                id,
                                msg: "Transacao aprovada!",
                                tipo: "sucesso",
                                lado: "esquerda"
                            }, ...prev]);

                            setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 6000);

                            setFormValor('');
                            setFormEstabelecimento('');
                            if (numeroConta) fetchExtrato(numeroConta);
                        } else {
                            const id = Date.now();
                            setNotifications(prev => [{
                                id,
                                msg: "Transacao reprovada!",
                                tipo: "erro",
                                lado: "esquerda"
                            }, ...prev]);

                            setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 6000);
                        }
                    } else {
                        const id = Date.now();
                        setNotifications(prev => [{
                            id,
                            msg: "Erro ao enviar transacao. Servidor indisponivel.",
                            tipo: "erro",
                            lado: "esquerda"
                        }, ...prev]);
                        setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 6000);
                    }
                } catch (e) {
                    console.error("Erro na simulacao:", e);
                    const id = Date.now();
                    setNotifications(prev => [{
                        id,
                        msg: "Erro ao conectar com o servidor.",
                        tipo: "erro",
                        lado: "esquerda"
                    }, ...prev]);
                    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 6000);
                } finally {
                    setSimulando(false);
                }
            };

            useEffect(() => {
                return () => {
                    if (eventSourceRef.current) {
                        console.log("Fechando conexão SSE no cleanup");
                        eventSourceRef.current.close();
                    }
                };
            }, []);
            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <nav className="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
                        <div className="flex items-center space-x-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                                <span className="text-white font-bold text-xl">B</span>
                            </div>
                            <h1 className="text-xl font-bold tracking-tight text-gray-900">Digital Bank</h1>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="flex flex-col items-end">
                                <span className="text-xs text-gray-500 uppercase font-semibold">Status de Rede</span>
                                <div className="flex items-center space-x-1.5">
                                    <div className={`w-2.5 h-2.5 rounded-full ${status === 'Conectado' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    <span className={`text-sm font-medium ${status === 'Conectado' ? 'text-green-700' : 'text-red-700'}`}>{status}</span>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto px-4 py-8">
                        {/* Notifications Overlay - Simulation (Left) */}
                        <div className="fixed top-20 left-4 z-50 space-y-3">
                            {notifications.filter(n => n.lado === "esquerda").map(n => {
                                const bgColors = {
                                    sucesso: "bg-emerald-600 border-emerald-400",
                                    erro: "bg-red-600 border-red-400",
                                    warn: "bg-amber-500 border-amber-300",
                                    default: "bg-indigo-600 border-indigo-400"
                                };
                                const icons = {
                                    sucesso: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    ),
                                    erro: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    ),
                                    warn: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                        </svg>
                                    ),
                                    default: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                                        </svg>
                                    )
                                };
                                const bg = bgColors[n.tipo] || bgColors.default;
                                const icon = icons[n.tipo] || icons.default;

                                return (
                                    <div key={n.id} className={`notification-animation ${bg} text-white px-6 py-4 rounded-xl shadow-2xl flex items-start space-x-3 max-w-sm border`}>
                                        {icon}
                                        <div className="flex-1">
                                            <h3 className="font-bold text-sm">
                                                {n.tipo === "sucesso" ? "Sucesso" : n.tipo === "erro" ? "Erro" : n.tipo === "warn" ? "Atencao" : "Nova Atividade"}
                                            </h3>
                                            <p className="text-white/90 text-sm">{n.msg}</p>
                                        </div>
                                        <button onClick={() => setNotifications(prev => prev.filter(notif => notif.id !== n.id))} className="text-white/60 hover:text-white">&times;</button>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Notifications Overlay - SSE (Right) */}
                        <div className="fixed top-20 right-4 z-50 space-y-3">
                            {notifications.filter(n => n.lado === "direita").map(n => {
                                const bgColors = {
                                    sucesso: "bg-emerald-600 border-emerald-400",
                                    erro: "bg-red-600 border-red-400",
                                    warn: "bg-amber-500 border-amber-300",
                                    default: "bg-indigo-600 border-indigo-400"
                                };
                                const icons = {
                                    sucesso: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    ),
                                    erro: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                    ),
                                    warn: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                                        </svg>
                                    ),
                                    default: (
                                        <svg className="w-6 h-6 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                                        </svg>
                                    )
                                };
                                const bg = bgColors[n.tipo] || bgColors.default;
                                const icon = icons[n.tipo] || icons.default;

                                return (
                                    <div key={n.id} className={`notification-animation ${bg} text-white px-6 py-4 rounded-xl shadow-2xl flex items-start space-x-3 max-w-sm border`}>
                                        {icon}
                                        <div className="flex-1">
                                            <h3 className="font-bold text-sm">
                                                {n.tipo === "sucesso" ? "Sucesso" : n.tipo === "erro" ? "Erro" : n.tipo === "warn" ? "Atencao" : "Nova Atividade"}
                                            </h3>
                                            <p className="text-white/90 text-sm">{n.msg}</p>
                                        </div>
                                        <button onClick={() => setNotifications(prev => prev.filter(notif => notif.id !== n.id))} className="text-white/60 hover:text-white">&times;</button>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Account Control */}
                            <div className="lg:col-span-4">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                    <h2 className="text-lg font-bold mb-6 flex items-center space-x-2">
                                        <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        <span>Minha Conta</span>
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Conectar a Conta</label>
                                            <div className="flex space-x-2">
                                                <input
                                                    type="text"
                                                    className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all font-mono font-bold"
                                                    value={numeroConta}
                                                    onChange={(e) => setNumeroConta(e.target.value)}
                                                    placeholder="Ex: 123"
                                                />
                                                <button
                                                    onClick={status === 'Conectado' ? disconnectSSE : connectSSE}
                                                    disabled={!numeroConta && status !== 'Conectado'}
                                                    className={`px-5 py-3 rounded-xl font-bold transition-all text-sm whitespace-nowrap ${
                                                        status === 'Conectado'
                                                            ? 'bg-red-600 text-white hover:bg-red-700'
                                                            : 'bg-indigo-600 text-white hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed'
                                                    }`}
                                                >
                                                    {status === 'Conectado' ? 'Desconectar' : 'Conectar'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Current Balance Section */}
                                {numeroConta && (
                                    <div className="mt-8 bg-white rounded-2xl shadow-sm border border-gray-200 p-6 overflow-hidden relative">
                                        <div className="absolute top-0 right-0 p-4 opacity-5">
                                            <svg className="w-20 h-20 text-gray-900" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fillRule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clipRule="evenodd"></path></svg>
                                        </div>
                                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Saldo em Conta</h2>
                                        <div className="flex items-baseline space-x-2">
                                            <span className="text-sm font-bold text-gray-500">R$</span>
                                            <span className={`text-3xl font-mono font-bold tracking-tighter ${saldo >= 0 ? 'text-gray-900' : 'text-red-600'}`}>
                                                {(saldo / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                            </span>
                                        </div>
                                    </div>
                                )}

                                {/* Credit Limit Section */}
                                {numeroConta && (
                                    <div className="mt-8 bg-white rounded-2xl shadow-sm border border-gray-200 p-6 overflow-hidden relative">
                                        <div className="absolute top-0 right-0 p-4 opacity-5">
                                            <svg className="w-20 h-20 text-indigo-600" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"></path><path fillRule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clipRule="evenodd"></path></svg>
                                        </div>
                                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Limite de Crédito</h2>
                                        <div className="flex items-baseline space-x-2">
                                            <span className="text-sm font-bold text-gray-500">R$</span>
                                            <span className="text-3xl font-mono font-bold tracking-tighter text-indigo-600">
                                                {(limiteCredito / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                            </span>
                                        </div>
                                    </div>
                                )}

                                {/* Simulation Form Section */}
                                <div className="mt-8 bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                    <h2 className="text-lg font-bold mb-6 flex items-center space-x-2 text-indigo-600">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <span>Simular Transação</span>
                                    </h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Número da Conta Destino</label>
                                            <input 
                                                type="text" 
                                                className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-mono font-bold"
                                                placeholder="Ex: 456"
                                                value={formNumeroConta}
                                                onChange={(e) => setFormNumeroConta(e.target.value)}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Estabelecimento</label>
                                            <input
                                                type="text"
                                                className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                placeholder="Ex: Starbucks"
                                                value={formEstabelecimento}
                                                onChange={(e) => setFormEstabelecimento(e.target.value)}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Data e Hora</label>
                                            <input
                                                type="datetime-local"
                                                className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                value={formDataHora}
                                                onChange={(e) => setFormDataHora(e.target.value)}
                                            />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Valor (R$)</label>
                                                <input 
                                                    type="number" 
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                    placeholder="0,00"
                                                    value={formValor}
                                                    onChange={(e) => setFormValor(e.target.value)}
                                                />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-400 uppercase tracking-wider block mb-2">Tipo</label>
                                                <select 
                                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                    value={formTipo}
                                                    onChange={(e) => setFormTipo(e.target.value)}
                                                >
                                                    <option value="DEBITO">Débito</option>
                                                    <option value="CREDITO">Crédito</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button
                                            onClick={simulateTransaction}
                                            disabled={simulando}
                                            className={`w-full text-white py-3 rounded-xl font-bold shadow-lg active:scale-[0.98] transition-all flex items-center justify-center space-x-2 ${
                                                simulando
                                                    ? "bg-indigo-400 cursor-not-allowed"
                                                    : "bg-indigo-600 hover:bg-indigo-700"
                                            }`}
                                        >
                                            {simulando ? (
                                                <>
                                                    <svg className="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                    <span>Processando...</span>
                                                </>
                                            ) : (
                                                <span>Simular Compra</span>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Statement Table */}
                            <div className="lg:col-span-8">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                                    <h2 className="text-lg font-bold">Extrato Bancário</h2>
                                    <div className="flex space-x-2">
                                        <button 
                                            onClick={() => window.location.href = `http://${BACKEND_IP}:8087/registro-transacao/extratoPdf/${numeroConta}`}
                                            className="text-xs font-bold bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors flex items-center space-x-1"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                            <span>PDF</span>
                                        </button>
                                        <button 
                                            onClick={async () => {
                                                try {
                                                    const res = await fetch(`http://${BACKEND_IP}:8087/registro-transacao/enviarExtratoEmail/${numeroConta}`, { method: 'POST' });
                                                    if (res.ok) alert("Solicitação de e-mail enviada!");
                                                } catch (e) { alert("Erro ao enviar e-mail"); }
                                            }}
                                            className="text-xs font-bold bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-200 transition-colors flex items-center space-x-1"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                            <span>E-mail</span>
                                        </button>
                                    </div>
                                </div>
                                    <div className="overflow-x-auto">
                                        {extrato.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center py-20 text-gray-400">
                                                <svg className="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                                                <p className="font-medium">Nenhuma transação registrada.</p>
                                            </div>
                                        ) : (
                                            <table className="w-full">
                                                <thead>
                                                    <tr className="bg-gray-50/50">
                                                        <th className="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase">Data e Hora</th>
                                                        <th className="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase">Descrição</th>
                                                        <th className="px-6 py-4 text-right text-xs font-bold text-gray-400 uppercase">Valor</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {extrato.map((t, i) => (
                                                        <tr key={i} className="hover:bg-gray-50 transition-colors">
                                                            <td className="px-6 py-5 whitespace-nowrap text-sm text-gray-500 font-medium">
                                                                {new Date(t.timeStamp).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                                            </td>
                                                            <td className="px-6 py-5">
                                                                <div className="flex flex-col">
                                                                    <span className="text-sm font-bold text-gray-900">{t.estabelecimento}</span>
                                                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">{t.tipoTransacao}</span>
                                                                </div>
                                                            </td>
                                                            <td className={`px-6 py-5 whitespace-nowrap text-right font-mono font-bold text-sm ${t.tipoTransacao === 'CREDITO' ? 'text-orange-600' : 'text-red-600'}`}>
                                                                {t.tipoTransacao === 'CREDITO' ? 'CRÉD ' : '-'} R$ {(t.valor / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>

                                {/* Credit Card Bill Section */}
                                <div className="mt-8 bg-indigo-900 rounded-2xl shadow-xl border border-indigo-800 overflow-hidden text-white">
                                    <div className="px-6 py-5 border-b border-indigo-800 bg-indigo-950/50 flex items-center justify-between">
                                        <h2 className="text-lg font-bold flex items-center space-x-2">
                                            <svg className="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                                            <span>Fatura Cartão de Crédito</span>
                                        </h2>
                                        <div className="flex items-center space-x-6">
                                            <button 
                                                onClick={() => window.location.href = `http://${BACKEND_IP}:8087/registro-transacao/faturaPdf/${numeroConta}`}
                                                className="text-[10px] font-bold bg-indigo-500/30 text-indigo-100 px-3 py-1.5 rounded-lg hover:bg-indigo-500/50 transition-colors flex items-center space-x-1 border border-indigo-500/30"
                                            >
                                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                                <span>PDF</span>
                                            </button>
                                            <div className="text-right">
                                                <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest block">Total em Aberto</span>
                                                <span className="text-xl font-mono font-bold text-indigo-200">
                                                    R$ {(extrato.filter(t => t.tipoTransacao === 'CREDITO').reduce((acc, t) => acc + t.valor, 0) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        {extrato.filter(t => t.tipoTransacao === 'CREDITO').length === 0 ? (
                                            <div className="flex flex-col items-center justify-center py-12 text-indigo-400/50">
                                                <p className="font-medium">Nenhuma compra no crédito.</p>
                                            </div>
                                        ) : (
                                            <table className="w-full">
                                                <thead className="bg-indigo-950/30">
                                                    <tr>
                                                        <th className="px-6 py-4 text-left text-xs font-bold text-indigo-400 uppercase">Data</th>
                                                        <th className="px-6 py-4 text-left text-xs font-bold text-indigo-400 uppercase">Loja</th>
                                                        <th className="px-6 py-4 text-right text-xs font-bold text-indigo-400 uppercase">Valor</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-indigo-800/50">
                                                    {extrato.filter(t => t.tipoTransacao === 'CREDITO').map((t, i) => (
                                                        <tr key={i} className="hover:bg-indigo-800/20 transition-colors">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-indigo-300">
                                                                {new Date(t.timeStamp).toLocaleDateString('pt-BR')}
                                                            </td>
                                                            <td className="px-6 py-4 text-sm font-bold text-indigo-100">
                                                                {t.estabelecimento}
                                                            </td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-right font-mono font-bold text-sm text-indigo-200">
                                                                R$ {(t.valor / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
