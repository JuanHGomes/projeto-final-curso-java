services:
  # Redis Database
  redis:
    image: redis:alpine
    container_name: my-redis-db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - backend-net

  # Redis GUI
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - "8001:5540"
    volumes:
      - ./redis_insight_data:/data
    networks:
      - backend-net

  mongodb:
    image: mongo:7
    container_name: my-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge