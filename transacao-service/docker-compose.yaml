services:
  # O Banco de Dados Redis
  redis:
    image: redis:alpine
    container_name: my-redis-db
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - redis-net

  # A Interface Gráfica (Redis Insight)
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: always
    ports:
      - "8001:5540"
    volumes:
      - ./redis_insight_data:/data
    networks:
      - redis-net

networks:
  redis-net:
    driver: bridge