spring:
  application:
    name: notificacao-service
  cloud:
    function:
      definition: notificacaoConsumer
    stream:
      bindings:
        notificacaoConsumer-in-0:
          destination: notificacao-topic
          group: notificacao-service
          content-type: application/json
        notificacaoProducer-out-0:
          destination: notificacao-topic
          content-type: application/json
      kafka:
        binder:
          brokers: localhost:9092
server:
  port: 8081