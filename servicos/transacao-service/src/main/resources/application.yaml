server:
  port: 8086
spring:
  application:
    name: transacao-service
  data:
    redis:
      host: localhost
      port: 6379
  mongodb:
    uri: mongodb://mongo:mongo@localhost:27017/test?authSource=admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  logging:
    level:
      org.hibernate.SQL: debug
